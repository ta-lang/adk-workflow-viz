<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADK Agent Workflow Visualizer</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155', 600: '#475569' }
      }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { font-family: 'Inter', sans-serif; }
code, pre, .mono { font-family: 'JetBrains Mono', monospace; }
.mermaid svg { max-width: 100%; height: auto; }
.agent-card { transition: all 0.2s ease; }
.agent-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
.log-entry { border-left: 3px solid transparent; }
.log-entry.info { border-left-color: #3b82f6; }
.log-entry.success { border-left-color: #22c55e; }
.log-entry.warning { border-left-color: #eab308; }
.log-entry.error { border-left-color: #ef4444; }
@keyframes pulse-dot { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.pulse-dot { animation: pulse-dot 1.4s infinite; }
.pulse-dot:nth-child(2) { animation-delay: 0.2s; }
.pulse-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease forwards; }
@keyframes slideIn { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 200px; } }
.slide-in { animation: slideIn 0.4s ease forwards; overflow: hidden; }
</style>
</head>
<body class="bg-primary-900 text-gray-100 min-h-screen">
<div class="max-w-7xl mx-auto p-4 lg:p-6">
  <header class="mb-6">
    <h1 class="text-2xl lg:text-3xl font-bold text-white flex items-center gap-3">
      <span class="w-8 h-8 bg-gradient-to-br from-blue-400 to-purple-500 rounded-lg flex items-center justify-center text-sm font-bold">ADK</span>
      Agent Workflow Visualizer
    </h1>
    <p class="text-gray-400 mt-1 text-sm">Design & simulate multi-agent workflows — Sequential · Parallel · Loop</p>
  </header>

  <div class="grid grid-cols-1 xl:grid-cols-5 gap-6">
    <!-- Left: Agent Config -->
    <div class="xl:col-span-2 space-y-4">
      <div class="bg-primary-800 rounded-xl p-4 border border-primary-700">
        <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3">Agent Config</h2>
        <div id="agentList" class="space-y-3"></div>
        <button onclick="addAgent()" class="mt-3 w-full py-2 px-3 border-2 border-dashed border-primary-600 rounded-lg text-gray-400 hover:border-blue-400 hover:text-blue-400 transition text-sm font-medium">+ Add Agent</button>
      </div>

      <div class="bg-primary-800 rounded-xl p-4 border border-primary-700">
        <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3">Workflow Type</h2>
        <div class="grid grid-cols-3 gap-2">
          <button onclick="setWorkflow('sequential')" id="wf-sequential" class="p-3 rounded-lg border text-center transition text-sm font-medium bg-blue-500/20 border-blue-500 text-blue-300">Sequential</button>
          <button onclick="setWorkflow('parallel')" id="wf-parallel" class="p-3 rounded-lg border text-center transition text-sm font-medium bg-primary-700 border-primary-600 text-gray-400">Parallel</button>
          <button onclick="setWorkflow('loop')" id="wf-loop" class="p-3 rounded-lg border text-center transition text-sm font-medium bg-primary-700 border-primary-600 text-gray-400">Loop</button>
        </div>
        <div class="mt-3 flex gap-2">
          <button onclick="generateFlow()" class="flex-1 py-2.5 px-4 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg font-semibold text-sm hover:from-blue-400 hover:to-purple-500 transition shadow-lg">Generate Flow</button>
          <button onclick="simulateRun()" id="simBtn" class="py-2.5 px-4 bg-primary-700 rounded-lg font-semibold text-sm hover:bg-primary-600 transition">Run</button>
        </div>
      </div>
    </div>

    <!-- Right: Visualization & Logs -->
    <div class="xl:col-span-3 space-y-4">
      <div class="bg-primary-800 rounded-xl p-4 border border-primary-700">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Flow Diagram</h2>
          <button onclick="downloadSVG()" class="text-xs text-gray-400 hover:text-white transition flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Download SVG
          </button>
        </div>
        <div id="mermaidContainer" class="bg-primary-900/50 rounded-lg p-4 min-h-[280px] flex items-center justify-center overflow-auto">
          <div class="text-gray-500 text-sm text-center">
            <svg class="w-12 h-12 mx-auto mb-2 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Configure agents & click <span class="text-blue-400 font-semibold">Generate Flow</span>
          </div>
        </div>
      </div>

      <div class="bg-primary-800 rounded-xl p-4 border border-primary-700">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Simulation Log</h2>
          <button onclick="clearLogs()" class="text-xs text-gray-400 hover:text-white transition">Clear</button>
        </div>
        <div id="logContainer" class="bg-black/40 rounded-lg p-3 h-48 overflow-y-auto font-mono text-xs space-y-1.5">
          <div class="text-gray-500 text-center py-6">Press <span class="text-blue-400">Run</span> to simulate agent execution</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
mermaid.initialize({ startOnLoad: false, theme: 'dark', flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' } });

const defaultAgents = [
  { name: 'Router Agent', role: 'Intent Classifier & Router', tool: 'Classifier', color: '#3b82f6' },
  { name: 'Coding Agent', role: 'Code generation & review', tool: 'Python Executor', color: '#22c55e' },
  { name: 'QA Agent', role: 'Test & validate output', tool: 'Test Runner', color: '#a855f7' },
];

let agents = JSON.parse(JSON.stringify(defaultAgents));
let workflowType = 'sequential';
let mermaidInstance = null;

function setWorkflow(type) {
  workflowType = type;
  ['sequential','parallel','loop'].forEach(t => {
    const btn = document.getElementById('wf-'+t);
    if (t === type) {
      btn.className = 'p-3 rounded-lg border text-sm transition text-sm font-medium bg-blue-500/20 border-blue-500 text-blue-300';
    } else {
      btn.className = 'p-3 rounded-lg border text-sm transition text-sm font-medium bg-primary-700 border-primary-600 text-gray-400';
    }
  });
}

function addAgent(data) {
  const a = data || { name: '', role: '', tool: '', color: '#6366f1' };
  agents.push(a);
  renderAgentList();
}

function removeAgent(idx) {
  if (agents.length <= 2) return;
  agents.splice(idx, 1);
  renderAgentList();
}

function renderAgentList() {
  const container = document.getElementById('agentList');
  container.innerHTML = agents.map((a, i) => `
    <div class="agent-card bg-primary-700/50 rounded-lg p-3 border border-primary-600">
      <div class="flex items-center gap-2 mb-2">
        <div class="w-3 h-3 rounded-full flex-shrink-0" style="background:${a.color}"></div>
        <input value="${a.name}" onchange="agents[${i}].name=this.value" placeholder="Agent name" class="flex-1 bg-transparent text-sm font-semibold text-white border-b border-transparent focus:border-blue-400 outline-none placeholder-gray-500">
        ${agents.length > 2 ? `<button onclick="removeAgent(${i})" class="text-gray-500 hover:text-red-400 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>` : ''}
      </div>
      <div class="grid grid-cols-2 gap-2">
        <input value="${a.role}" onchange="agents[${i}].role=this.value" placeholder="Role" class="bg-primary-800/50 text-xs text-gray-300 px-2 py-1.5 rounded border border-primary-600 outline-none focus:border-blue-400">
        <input value="${a.tool}" onchange="agents[${i}].tool=this.value" placeholder="Tool" class="bg-primary-800/50 text-xs text-gray-300 px-2 py-1.5 rounded border border-primary-600 outline-none focus:border-blue-400">
      </div>
      <div class="mt-2 flex items-center gap-2">
        <span class="text-xs text-gray-500">Color</span>
        <input type="color" value="${a.color}" onchange="agents[${i}].color=this.value" class="w-6 h-6 rounded cursor-pointer border-0 p-0 bg-transparent">
      </div>
    </div>
  `).join('');
}

function buildMermaidDef() {
  const names = agents.map(a => a.name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_'));
  let def = 'flowchart TD\n';

  if (workflowType === 'sequential') {
    def += `  ${names[0]}["${agents[0].name}<br/><small>${agents[0].role}</small>"]\n`;
    for (let i = 1; i < names.length; i++) {
      def += `  ${names[i]}["${agents[i].name}<br/><small>${agents[i].role}</small>"]\n`;
      def += `  ${names[i-1]} -->|${agents[i-1].tool}| ${names[i]}\n`;
    }
    def += `  ${names[names.length-1]} -->|Result| END["✅ Output"]\n`;
    def += `  START(["📥 Input"]) --> ${names[0]}\n`;
  } else if (workflowType === 'parallel') {
    def += `  START(["📥 Input"]) --> Router{"Router: Route tasks"}\n`;
    names.forEach((n, i) => {
      def += `  ${n}["${agents[i].name}<br/><small>${agents[i].role}</small>"]\n`;
      def += `  Router -->|${agents[i].tool}| ${n}\n`;
    });
    def += `  Merge{"🔀 Merge Results"}\n`;
    names.forEach(n => def += `  ${n} --> Merge\n`);
    def += `  Merge --> END(["✅ Output"])\n`;
  } else {
    def += `  START(["📥 Input"]) --> ${names[0]}\n`;
    def += `  ${names[0]}["${agents[0].name}<br/><small>${agents[0].role}</small>"]\n`;
    def += `  ${names[0]} --> ${names[1]}\n`;
    def += `  ${names[1]}["${agents[1].name}<br/><small>${agents[1].role}</small>"]\n`;
    def += `  ${names[1]} -->|"Quality Check"| ${names[2]}\n`;
    if (names[2]) def += `  ${names[2]}["${agents[2].name}<br/><small>${agents[2].role}</small>"]\n`;
    def += `  ${names[2]} -->|"❌ Needs Fix"| ${names[0]}\n`;
    def += `  ${names[2]} -->|"✅ Pass"| END(["✅ Output"])\n`;
  }
  return def;
}

async function generateFlow() {
  const container = document.getElementById('mermaidContainer');
  const def = buildMermaidDef();

  container.innerHTML = '<div class="text-gray-500 text-sm py-8">Rendering flow...</div>';

  try {
    const { svg } = await mermaid.render('mermaid_' + Date.now(), def);
    container.innerHTML = svg;
  } catch (e) {
    container.innerHTML = `<div class="text-red-400 text-sm p-4">Render error: ${e.message}</div>`;
  }
}

function simulateRun() {
  const logEl = document.getElementById('logContainer');
  logEl.innerHTML = '';
  const names = agents.map(a => a.name);
  let step = 0;

  function addLog(agent, msg, type = 'info') {
    const entry = document.createElement('div');
    entry.className = `log-entry ${type} fade-in pl-2 py-1 text-xs`;
    const ts = new Date().toLocaleTimeString();
    entry.innerHTML = `<span class="text-gray-500">[${ts}]</span> <span class="text-gray-400">${agent}:</span> <span class="${type === 'error' ? 'text-red-400' : type === 'warning' ? 'text-yellow-400' : type === 'success' ? 'text-green-400' : 'text-gray-200'}">${msg}</span>`;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
  }

  async function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  (async () => {
    if (workflowType === 'sequential') {
      addLog('System', 'Starting Sequential workflow...', 'info');
      await delay(400);
      for (const a of agents) {
        addLog(a.name, `Processing with ${a.tool}...`, 'info');
        await delay(500);
        addLog(a.name, `✓ Completed: ${a.role}`, 'success');
        await delay(300);
      }
      addLog('System', '🎉 Sequential workflow complete!', 'success');
    } else if (workflowType === 'parallel') {
      addLog('Router', 'Distributing tasks to agents in parallel...', 'warning');
      await delay(300);
      const promises = agents.map(async (a) => {
        addLog(a.name, `⚡ Running ${a.role} (parallel)...`, 'info');
        await delay(600 + Math.random() * 400);
        addLog(a.name, `✓ Completed: ${a.tool} execution`, 'success');
      });
      await Promise.all(promises);
      addLog('System', '🔀 Merging parallel results...', 'warning');
      await delay(300);
      addLog('System', '🎉 Parallel workflow complete!', 'success');
    } else {
      addLog('System', '🔄 Starting Loop workflow...', 'info');
      await delay(400);
      addLog(agents[0].name, `Drafting initial solution...`, 'info');
      await delay(600);
      addLog(agents[1].name, `Reviewing quality...`, 'info');
      await delay(500);
      addLog(agents[1].name, `⚠️ Found issues, requesting fixes`, 'warning');
      await delay(400);
      addLog(agents[2]?.name || agents[0].name, `Applying fixes (iteration 1)...`, 'info');
      await delay(500);
      addLog(agents[1].name, `✅ Quality check PASSED`, 'success');
      addLog('System', '🎉 Loop workflow complete!', 'success');
    }
  })();
}

function clearLogs() {
  document.getElementById('logContainer').innerHTML = '<div class="text-gray-500 text-center py-6">Logs cleared</div>';
}

function downloadSVG() {
  const svg = document.querySelector('#mermaidContainer svg');
  if (!svg) return;
  const clone = svg.cloneNode(true);
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(clone);
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'agent-workflow.svg'; a.click();
  URL.revokeObjectURL(url);
}

renderAgentList();
setTimeout(generateFlow, 100);
</script>
</body>
</html>
